name: PR Quick Check

# Runs on every Pull Request — fast feedback before merge
on:
  pull_request:
    branches: [main, develop]

jobs:
  quick-build:
    name: Quick Build Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, movie-service, review-service, api-gateway]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile (no tests — fast check)
        run: ./mvnw compile -B -q

  frontend-check:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --silent
      - run: npm run build
        env:
          CI: true
          REACT_APP_API_BASE_URL: http://localhost:8080

  docker-build-check:
    name: Dockerfile Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint all Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          failure-threshold: error
