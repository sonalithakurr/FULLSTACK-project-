name: CineVerse CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/cineverse

jobs:
  # ─── Test Auth Service ───────────────────────────────────────────────────────
  test-auth-service:
    name: Test Auth Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: ./mvnw test -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-test-results
          path: auth-service/target/surefire-reports/

  # ─── Test Movie Service ──────────────────────────────────────────────────────
  test-movie-service:
    name: Test Movie Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: movie-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - run: ./mvnw test -B

  # ─── Test Review Service ─────────────────────────────────────────────────────
  test-review-service:
    name: Test Review Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: review-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - run: ./mvnw test -B

  # ─── Test Frontend ──────────────────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm test -- --watchAll=false --passWithNoTests
      - run: npm run build

  # ─── Build & Push Docker Images ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-auth-service, test-movie-service, test-review-service, test-frontend]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [auth-service, movie-service, review-service, api-gateway, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Integration Test ────────────────────────────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker-compose up -d --wait
        timeout-minutes: 5

      - name: Health checks
        run: |
          curl -f http://localhost:8080/actuator/health
          curl -f http://localhost:8081/actuator/health
          curl -f http://localhost:8082/actuator/health
          curl -f http://localhost:8083/actuator/health

      - name: Smoke test — register user
        run: |
          curl -sf -X POST http://localhost:8080/api/v1/auth/register \
            -H 'Content-Type: application/json' \
            -d '{"username":"ci_user","email":"ci@test.com","password":"Test@123","displayName":"CI User"}'

      - name: Tear down
        if: always()
        run: docker-compose down -v
