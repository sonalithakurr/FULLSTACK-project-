server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: auth-service

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: cineverse
    password: cineverse_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate          # Use Flyway/Liquibase for migrations in prod
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ─── Redis ───────────────────────────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      password: cineverse_redis
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # ─── RabbitMQ ────────────────────────────────────────────────────────────────
  rabbitmq:
    host: localhost
    port: 5672
    username: cineverse
    password: cineverse_pass
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual    # Manual ack for reliability

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt:
  secret: cineverse-super-secret-jwt-key-256-bits-long-change-in-prod
  expiry-ms: 86400000              # 24 hours
  refresh-expiry-ms: 604800000     # 7 days

# ─── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ─── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    com.cineverse: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
# Docker profile overrides
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}

jwt:
  secret: ${JWT_SECRET}
  expiry-ms: ${JWT_EXPIRY_MS:86400000}
